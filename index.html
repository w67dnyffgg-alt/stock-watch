<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ふわっと STOCK WATCH Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>🌸 ふわっと STOCK WATCH Pro</h1>
      <p>実取引・WATCH・シミュレーション・成績表</p>
    </header>

    <nav class="tabs">
      <button class="tab active" onclick="showTab(event, 'trade')">実取引</button>
      <button class="tab" onclick="showTab(event, 'watch')">WATCH</button>
      <button class="tab" onclick="showTab(event, 'sim')">シミュレーション</button>
      <button class="tab" onclick="showTab(event, 'summary')">銘柄別まとめ</button>
      <button class="tab" onclick="showTab(event, 'stats')">成績表</button>
    </nav>

    <section id="trade" class="tab-content active">
      <div class="summary-box">
        <div><span>確定した合計損益</span><strong id="totalProfit">0円</strong></div>
        <div><span>実取引数</span><strong id="tradeCount">0件</strong></div>
      </div>

      <div class="card">
        <h2>実際に買った株を記録</h2>
        <input id="stockName" type="text" placeholder="銘柄名 例：東京エレクトロン" />
        <label>買った日</label>
        <input id="tradeBuyDate" type="date" />
        <input id="buyPrice" type="number" placeholder="買値" />
        <input id="quantity" type="number" placeholder="株数" />
        <select id="tradeFeeling">
          <option value="😊 落ち着いて判断できた">😊 落ち着いて判断できた</option>
          <option value="✨ 自信あり">✨ 自信あり</option>
          <option value="🥹 不安だった">🥹 不安だった</option>
          <option value="🔥 勢いで買った">🔥 勢いで買った</option>
          <option value="😭 焦ってしまった">😭 焦ってしまった</option>
        </select>
        <textarea id="memo" placeholder="なぜ買った？買った時の理由・感情メモ"></textarea>
        <button onclick="addTrade()">買った株を記録する</button>
      </div>

      <h2>実取引履歴</h2>
      <div id="tradeList"></div>
    </section>

    <section id="watch" class="tab-content">
      <div class="card">
        <h2>気になる株メモ</h2>
        <input id="watchName" type="text" placeholder="銘柄名 例：ANYCOLOR" />
        <label>記録日</label>
        <input id="watchDate" type="date" />
        <input id="watchPrice" type="number" placeholder="見ている株価" />
        <input id="targetBuyPrice" type="number" placeholder="買いたい価格" />
        <input id="takeProfitPrice" type="number" placeholder="利確目安" />
        <input id="stopLossPrice" type="number" placeholder="損切り目安" />
        <select id="watchStatus">
          <option value="👀 様子見">👀 様子見</option>
          <option value="📉 下がったら買いたい">📉 下がったら買いたい</option>
          <option value="📈 上昇トレンド確認中">📈 上昇トレンド確認中</option>
          <option value="⚠️ 急落後なので慎重">⚠️ 急落後なので慎重</option>
          <option value="⭐ お気に入り">⭐ お気に入り</option>
        </select>
        <textarea id="watchMemo" placeholder="気になる理由・ニュース・チャートの印象"></textarea>
        <button onclick="addWatch()">WATCHに追加する</button>
      </div>

      <h2>WATCHリスト</h2>
      <div id="watchList"></div>
    </section>

    <section id="sim" class="tab-content">
      <div class="summary-box">
        <div><span>確定した仮想損益</span><strong id="simTotalProfit">0円</strong></div>
        <div><span>シミュレーション数</span><strong id="simCount">0件</strong></div>
      </div>

      <div class="card">
        <h2>買ったつもりシミュレーション</h2>
        <input id="simName" type="text" placeholder="銘柄名 例：東京エレクトロン" />
        <label>買ったと仮定した日</label>
        <input id="simBuyDate" type="date" />
        <input id="simBuyPrice" type="number" placeholder="仮想買値" />
        <input id="simQuantity" type="number" placeholder="株数" />
        <select id="simFeeling">
          <option value="😊 落ち着いて買ったつもり">😊 落ち着いて買ったつもり</option>
          <option value="✨ 上がりそうと思った">✨ 上がりそうと思った</option>
          <option value="📉 押し目だと思った">📉 押し目だと思った</option>
          <option value="🔥 勢いで買いたくなった">🔥 勢いで買いたくなった</option>
          <option value="⚠️ 迷いながら検証">⚠️ 迷いながら検証</option>
        </select>
        <textarea id="simMemo" placeholder="なぜ買ったつもり？検証したいこと"></textarea>
        <button onclick="addSimulation()">シミュレーション開始</button>
      </div>

      <h2>シミュレーション履歴</h2>
      <div id="simList"></div>
    </section>

    <section id="summary" class="tab-content">
      <h2>銘柄別まとめ</h2>
      <div id="stockSummaryList"></div>

      <div class="card">
        <div id="backupReminder"></div>
        <h2>バックアップ</h2>
        <p class="memo">データを書き出したり、保存したバックアップを読み込めます。</p>
        <button onclick="exportBackup()">バックアップを書き出す</button>
        <label class="small-btn file-label">
          バックアップを読み込む
          <input type="file" id="backupFile" accept=".json" onchange="importBackup(event)" hidden>
        </label>
      </div>
    </section>

    <section id="stats" class="tab-content">
      <h2>📊 ふわっと投資家成績表</h2>
      <div id="statsList"></div>
    </section>
  </div>

  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="editModalTitle">編集</h2>
      <div id="editFields"></div>
      <button onclick="saveEdit()">保存する</button>
      <button class="delete-btn" onclick="deleteEditingItem()">削除する</button>
      <button class="small-btn" onclick="closeEditModal()">閉じる</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
